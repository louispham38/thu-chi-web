# Fly.io — Thu Chi Web
# Đổi `app` nếu tên đã bị người khác dùng (vd: thu-chi-louispham)
app = "thu-chi-web"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite trên volume (user/workspace OAuth). Không set DATABASE_URL trong secrets nếu dùng path này.
  DATABASE_URL = "sqlite:////data/thu_chi.db"
  PYTHON_VERSION = "3.11"

[[mounts]]
  source = "thu_chi_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/ping"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
